apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: online-boutique
  annotations:
    github.com/project-slug: fsjdevops/microservices-demo
spec:
  owner: openchoreo-users
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: frontend
  annotations:
    github.com/project-slug: fsjdevops/microservices-demo
spec:
  type: web-application
  lifecycle: production
  owner: openchoreo-users
  system: online-boutique
